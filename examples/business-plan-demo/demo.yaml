scenario:
  name: "Pandalyzer test" # in mosaik so called world
  start_time: '2025-04-15 00:00:00' # ISO 8601 start time of the simulation
  end_time: '2025-07-31 23:50:00' # duration in seconds 
  time_resolution: 1800 # time step in seconds (optional). Defaults to 15 minutes (900 s)

monitor:
  file: './to_dashboard.csv'
  items:
  - Battery1.soc
  - Load1.load_dem_out
  - Wind1.wind_gen_out
  - PV1.pv_gen_out

models:
- name: businessController1
  type: businessController
  inputs:
    pv_genState: 0
    wind_genState: 0
    load_demandState: 0
    bat_pout: 0
    bat_pin: 0
  outputs:
    battery_flow: 0
    grid_flow: 0

- name: CSV_PV
  type: CSV
  parameters:
    file_path: 'examples/BAP-2025-Simulation/Solar_april.csv'
    delimiter: ','
    date_format: 'YYYY-MM-DD HH:mm:ss'
  states:
    utilization: 

- name: CSV_Load
  type: CSV
  parameters:
    file_path: 'examples/BAP-2025-Simulation/load_april.csv'
    delimiter: ','
    date_format: 'YYYY-MM-DD HH:mm:ss'
  states:
    load:

- name: PV1
  type: PV
  parameters:
    cap: 20
    output_type: power
    input_type: percentage
    name: PV
    par1: 0.9950484924913617
    par2: 0.18312331593381959
  inputs:
    G_Gh: 0
    G_Dh: 0
    G_Bn: 0
    Ta: 0
    hs: 0
    FF: 0
    Az: 0
    capacity_percentage: null
  outputs:
    pv_gen_out: null
    total_irr: null
    g_aoi: null
  states:
    pv_gen: {}
    pv_genState: {}
  connect:
    ip: 192.168.0.6
    port: 5100

- name: Wind1
  type: Wind
  parameters:
    p_rated: 10
    u_rated: 10.3  
    u_cutin: 2.8  
    u_cutout: 25  
    cp: 0.40
    diameter: 2
    output_type: power
    input_type: percentage
    name: WindOn
    area_type: onshore
    par1: 1.331013155181533
    par2: 0.3517482530661208
  inputs:
    u: null
    capacity_percentage: 90
  outputs:
    wind_gen_out: null
    u: null
  states:
    wind_gen: {}
    wind_genState: 0
  connect:
    ip: 192.168.0.9
    port: 5100

- name: Battery1
  type: Battery
  parameters:
    max_p: 150
    min_p: -150
    max_energy: 30
    charge_efficiency: 100
    discharge_efficiency: 100
    soc_min: 0
    soc_max: 100
    name: Battery
    soc_init: 0
  inputs:
    flow2b: 0
  outputs:
    p_out: 0
    p_in: 0
  states:
    mod: 0
    soc: 0
    flag: -1
    grid_demand: 0
  connect:
    ip: 192.168.0.10
    port: 5100

- name: Load1
  type: Load
  parameters:
    houses: 1
    output_type: power
    input_type: total
    name: Load
    total: 0.001
  inputs:
    load:
  outputs:
    consumption: 0
  states:
    load_dem_out: 0
    load_dem: {}
  connect:
    ip: 192.168.0.11
    port: 5100

- name: PV_LED
  type: LED_connection
  connect:
    ip: 192.168.0.6
    port: 5000
  parameters:
    min_speed: 0  # minimum speed for the LED connection (0-100%)
    max_speed: 0.6  # maximum speed for the LED connection (0-100%)
    direction: 1  # direction of the LED connection (0=towards the white connector)
    port: /dev/ttyACM0
    max_power: 15 #kw
  inputs:
    power: 5  # speed for the LED connection (0-100%)

- name: load_LED
  type: LED_connection
  connect:
    ip: 192.168.0.11
    port: 5000
  parameters:
    min_speed: 0  # minimum speed for the LED connection (0-100%)
    max_speed: 0.6  # maximum speed for the LED connection (0-100%)
    direction: 1  # direction of the LED connection (0=towards the white connector)
    port: /dev/ttyACM0
    max_power: 15 #kw
  inputs:
    power: 5  # speed for the LED connection (0-100%)

- name: wind_led
  type: LED_connection
  connect:
    ip: 192.168.0.9
    port: 5000
  parameters:
    min_speed: 0  # minimum speed for the LED connection (0-100%)
    max_speed: 0.6  # maximum speed for the LED connection (0-100%)
    direction: 1  # direction of the LED connection (0=towards the white connector)
    port: /dev/ttyACM0
    max_power: 15 #kw
  inputs:
    power: 5  # speed for the LED connection (0-100%)

- name: grid_LED
  type: LED_connection
  connect:
    ip: 192.168.0.10
    port: 5000
  parameters:
    min_speed: 0  # minimum speed for the LED connection (0-100%)
    max_speed: 0.6  # maximum speed for the LED connection (0-100%)
    direction: 1  # direction of the LED connection (0=towards the white connector)
    port: /dev/ttyACM0
    max_power: 15 #kw
  inputs:
    power: 5  # speed for the LED connection (0-100%)

connections:
- from: CSV_PV.utilization
  to: PV1.capacity_percentage
- from: CSV_Load.load
  to: Load1.load 

- from: PV1.pv_genState 
  to: Battery1.flow2b
- from: Wind1.wind_genState
  to: Battery1.flow2b
- from: Load1.load_dem_out
  to: Battery1.flow2b
  
- from: PV1.pv_genState
  to: businessController1.pv_genState
- from: Wind1.wind_gen
  to: businessController1.wind_genState
- from: Load1.consumption
  to: businessController1.load_demandState
- from: Battery1.p_out
  to: businessController1.bat_pout
- from: Battery1.p_in
  to: businessController1.bat_pin

- from: Battery1.grid_demand
  to: grid_LED.power
- from: PV1.pv_genState
  to: PV_LED.power
- from: Wind1.wind_genState
  to: wind_led.power
- from: Load1.load_dem_out
  to: load_LED.power