scenario:
  name: "Pandalyzer test" # in mosaik so called world
  start_time: '2025-04-15 00:00:00' # ISO 8601 start time of the simulation
  end_time: '2025-04-15 23:50:00' # duration in seconds 
  time_resolution: 1800 # time step in seconds (optional). Defaults to 15 minutes (900 s)

monitor:
  file:
  items:
  - FossilGas1.emission

models:
- name: PandaController1
  type: PandaController
  parameters:
    peripherals: {}
    stations: {}                 
    ps_connections: {}
    ss_connections: {}
    lines_file_path: demo_line_specs.csv
  inputs:
    ncp_powers: {}
  states:
    cp_powers: {}
    tl_powers: {}
    one_l_congestion: 0
    max_congested: null
    max_congested_all: 0
    independence: 0
    execution_time: 0
    incoming: 0
    outgoing: 0

- name: CSV_PV
  type: CSV
  parameters:
    file_path: 'Solar_april.csv'
    delimiter: ','
    date_format: 'YYYY-MM-DD HH:mm:ss'
  states:
    utilization: 

- name: CSV_Load
  type: CSV
  parameters:
    file_path: 'load_april.csv'
    delimiter: ','
    date_format: 'YYYY-MM-DD HH:mm:ss'
  states:
    load:

- name: WRandomizer_onshore
  type: WindRandomizer
  parameters:
    area_type: onshore
  outputs:
    fraction_out: null
  states:
    s: -1
    ds: 0.3
    dds: 0
    fraction: 0

- name: Load1
  type: Load
  parameters:
    houses: 1
    output_type: power
    input_type: total
    name: Load
    total: 0.60
  inputs:
    load:
  outputs:
    load_dem_out: 0
    consumption: 0
  states:
    load_dem: {}

- name: HP1
  type: LoadHeatpump
  parameters:
    houses_case: 1
    houses_data: 1
    name: HP
  inputs:
    hp_load: {}
  outputs:
    load_HP: 0

- name: Load2
  type: Load
  parameters:
    houses: 1
    output_type: power
    input_type: total
    name: Load
    total: 0.40
  inputs:
    load:
  outputs:
    load_dem_out: 0
    consumption: 0
  states:
    load_dem: {}

- name: EV1
  type: LoadEV
  parameters:
    houses_case: 1
    houses_data: 1
    name: EV
  inputs:
    power: {}
    n: 0
  outputs:
    load_EV: 0

- name: PV1
  type: PV
  parameters:
    cap: 100
    output_type: power
    input_type: percentage
    name: PV
    par1: 0.9950484924913617
    par2: 0.18312331593381959
  inputs:
    G_Gh: 0
    G_Dh: 0
    G_Bn: 0
    Ta: 0
    hs: 0
    FF: 0
    Az: 0
    capacity_percentage: null
  outputs:
    pv_gen_out: null
    total_irr: null
    g_aoi: null
  states:
    pv_gen: {}

- name: WindOn1
  type: Wind
  parameters:
    p_rated: 700
    u_rated: 10.3  
    u_cutin: 2.8  
    u_cutout: 25  
    cp: 0.40
    diameter: 2
    output_type: power
    input_type: percentage
    name: WindOn
    area_type: onshore
    par1: 1.331013155181533
    par2: 0.3517482530661208
  inputs:
    u: null
    capacity_percentage: null
  outputs:
    wind_gen_out: null
    u: null
  states:
    wind_gen: {}

- name: Battery1
  type: Battery
  parameters:
    max_p: 150
    min_p: 150
    max_energy: 50
    charge_efficiency: 100
    discharge_efficiency: 100
    soc_min: 0
    soc_max: 100
    name: Battery
    soc_init: 0
  inputs:
    flow2b: 0
    soc_val: 0
  outputs:
    p_out: 0
    p_in: 0
  states:
    mod: 0
    soc: 0
    flag: -1

- name: GC1
  type: GridConnection
  parameters:
    connection_capacity: 1400
    tolerance_limit: 1
    critical_limit: 1
    name: GC
  inputs:
    dump: null
    dump_dict: null
  outputs:
    dump: null

- name: FossilGas1
  type: Fossil
  parameters:
    fos_type: gas
    fos_eff: 1
    bio_eff: 1
    fos_NRG_density: 1
    bio_NRG_density: 1
    fos_specific_emission: 1
    bio_specific_emission: 1
    rated_pow: 1600
    output_type: power
    name: FossilGas
    bio_emission_rate: 68
    coal_emission_rate: 697.85
    gas_emission_rate: 421
    bio_frac: 0.15
    bio_waste: 68
    coal_waste: 809
    gas_waste: 421
  inputs:
    req_pow: null
    req_pow_dict: null
    bio_frac: null
  outputs:
    gen_pow: null
    emission: null
    fossil_fuel_burned: null
    biomass_burned: null

- name: Station1
  type: Station
  parameters:
    station_ID: Station1
    kv: 380
  inputs:
    cp_powers: {}
    tl_powers: {}
  states:
    cp_powers: {}
    transmit: {}

- name: Station2
  type: Station
  parameters:
    station_ID: Station1
    kv: 380
  inputs:
    cp_powers: {}
    tl_powers: {}
  states:
    cp_powers: {}
    transmit: {}

- name: Station3
  type: Station
  parameters:
    station_ID: Station1
    kv: 380
  inputs:
    cp_powers: {}
    tl_powers: {}
  states:
    cp_powers: {}
    transmit: {}

- name: Station4
  type: Station
  parameters:
    station_ID: Station1
    kv: 380
  inputs:
    cp_powers: {}
    tl_powers: {}
  states:
    cp_powers: {}
    transmit: {}

- name: Station5
  type: Station
  parameters:
    station_ID: Station1
    kv: 380
  inputs:
    cp_powers: {}
    tl_powers: {}
  states:
    cp_powers: {}
    transmit: {}

- name: Station6
  type: Station
  parameters:
    station_ID: Station1
    kv: 380
  inputs:
    cp_powers: {}
    tl_powers: {}
  states:
    cp_powers: {}
    transmit: {}

- name: Station7
  type: Station
  parameters:
    station_ID: Station1
    kv: 380
  inputs:
    cp_powers: {}
    tl_powers: {}
  states:
    cp_powers: {}
    transmit: {}

connections:
- from: WindOn1.wind_gen
  to: Station1.ncp_powers

- from: PV1.pv_gen
  to: Station2.ncp_powers

- from: Load1.load_dem
  to: Station3.ncp_powers

- from: Station3.cp_powers
  to: LoadHeatpump.hp_load

- from: Load2.load_dem
  to: Station4.ncp_powers

- from: Station4.cp_powers
  to: LoadEV.power

- from: Station5.cp_powers
  to: Battery1.flow2b

- from: Station6.cp_powers
  to: FossilGas1.req_pow_dict

- from: Station7.cp_powers
  to: GC1.dump_dict