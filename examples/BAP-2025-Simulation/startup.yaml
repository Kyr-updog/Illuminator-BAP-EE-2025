scenario:
  name: startup
  start_time: '2012-01-01 00:00:00'
  end_time: '2012-01-01 00:30:00'
  time_resolution: 900

monitor:
  file: './out.csv'
  items:
  - request2.stripList

models:

- name: TopologyCreator
  type: TopologyMaker
  parameters: 
    filename: 'examples/Cluster/Tutorial_cluster'
  inputs:
    config: {}

- name: request1
  type: IDrequester
  connect: 
    ip: 192.168.0.6
    port: 5000
  parameters:
    deviceID: ['192.168.0.6', 5000]
  states:
    stripList: None

- name: request2
  type: IDrequester
  connect: 
    ip: '192.168.0.7'
    port: 5000
