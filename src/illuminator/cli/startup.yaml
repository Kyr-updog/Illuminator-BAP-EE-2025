scenario:
  name: startup
  start_time: '2012-01-01 00:00:00'
  end_time: '2012-01-01 00:15:00'
  time_resolution: 900

monitor:
  file: './out.csv'
  items:
  - request2.stripList

models:

- name: TopologyCreator
  type: TopologyMaker
  parameters: 
    filename: 'examples/Cluster/Tutorial_cluster'
  inputs:
    config: {}

- name: request1
  type: IDrequester
  connect: 
    ip: 127.0.0.1
    port: 5001
  parameters:
    deviceID: 
      - 127.0.0.1
      - 5001
  states:
    stripList: None

- name: request2
  type: IDrequester
  connect: 
    ip: '127.0.0.1'
    port: 5000
  parameters:
    deviceID: ['127.0.0.1', 5000]
  states:
    stripList: None

- name: request3
  type: IDrequester
  connect: 
    ip: '127.0.0.1'
    port: 5003
  parameters:
    deviceID: ['127.0.0.1', 5003]
  states:
    stripList: None

- name: request4
  type: IDrequester
  connect: 
    ip: '127.0.0.1'
    port: 5004
  parameters:
    deviceID: ['127.0.0.1', 5004]
  states:
    stripList: None

- name: request5
  type: IDrequester
  connect: 
    ip: '127.0.0.1'
    port: 5005
  parameters:
    deviceID: ['127.0.0.1', 5005]
  states:
    stripList: None

connections:
- from: request1.stripList
  to: TopologyCreator.config
- from: request2.stripList
  to: TopologyCreator.config
